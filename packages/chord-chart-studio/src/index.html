<!doctype html>
<html class="no-js" lang="en_EN">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="x-ua-compatible" content="ie=edge" />
		<title>Chord Chart Studio</title>
		<meta
			name="description"
			content="Build chord charts easily for all musicians. The official editor of ChordMark."
		/>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, shrink-to-fit=no"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- legacy icons: remove me at some point -->
		<link
			href="https://fonts.googleapis.com/icon?family=Material+Icons"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..700;1,300..700&display=swap"
			rel="stylesheet"
		/>
		<link rel="icon" href="/favicon.ico" sizes="32x32" />
		<link rel="icon" href="/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />

		<script type="module" src="./main.js"></script>
		<!-- Global site tag (gtag.js) - Google Analytics -->
		<script
			async
			src="https://www.googletagmanager.com/gtag/js?id=G-EGKBT2J600"
		></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag('js', new Date());

			gtag('config', 'G-EGKBT2J600');
		</script>
	</head>
	<body>
		<div id="app"></div>
		<script>
			(function () {
				var el = document.getElementById('app');
				if (!el) return;
				var t = 'theme-dark';
				try {
					var raw = localStorage.getItem('state');
					if (!raw) {
						if (
							window.matchMedia &&
							window.matchMedia('(prefers-color-scheme: light)').matches
						) {
							t = 'theme-light';
						}
					} else {
						var p = JSON.parse(raw);
						var v =
							p &&
							p.db &&
							p.db.options &&
							p.db.options.editorPreferences &&
							p.db.options.editorPreferences.values &&
							p.db.options.editorPreferences.values.uiColorScheme;
						if (v === 'light') t = 'theme-light';
						else if (v === 'dark') t = 'theme-dark';
						else if (
							v === 'system' &&
							window.matchMedia &&
							window.matchMedia('(prefers-color-scheme: light)').matches
						)
							t = 'theme-light';
					}
				} catch (e) {}
				el.classList.add(t);
			})();
		</script>
	</body>
</html>
