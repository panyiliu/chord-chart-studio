services:
  chord-chart-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CHORD_STUDIO_IMAGE}
    container_name: chord-chart-studio
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT}:${APP_CONTAINER_PORT}"
    depends_on:
      - backup-proxy

  backup-proxy:
    build:
      context: ./packages/backup-proxy
      dockerfile: Dockerfile
    image: ${BACKUP_PROXY_IMAGE}
    container_name: chord-chart-studio-backup-proxy
    restart: unless-stopped
    ports:
      - "${BACKUP_PROXY_HOST_PORT}:${BACKUP_PROXY_CONTAINER_PORT}"
    environment:
      - BACKUP_PROXY_PORT=${BACKUP_PROXY_PORT}
      - BACKUP_PROXY_CORS_ORIGIN=${BACKUP_PROXY_CORS_ORIGIN}
